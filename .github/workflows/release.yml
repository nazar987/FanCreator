name: Release

# Сборка и публикация релиза при пуше тега вида v2.0.0.
# electron-builder заливает установщик + latest.yml в GitHub Releases,
# откуда electron-updater (в приложении) берёт обновления.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci + postinstall (electron-builder install-app-deps) пересоберёт
      # нативный better-sqlite3 под Electron на раннере
      - run: npm ci

      - run: npx electron-vite build

      - name: Build & publish installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
